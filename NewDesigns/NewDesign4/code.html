<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Varman - Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-tertiary-fixed-variant": "#3b4569",
                        "surface-container": "#1d1f2a",
                        "error": "#ffb4ab",
                        "background": "#11131d",
                        "outline": "#849495",
                        "surface-container-low": "#191b26",
                        "on-tertiary": "#242f51",
                        "on-secondary-fixed-variant": "#00497f",
                        "on-secondary": "#00325a",
                        "surface-tint": "#00dbe9",
                        "surface-bright": "#373844",
                        "secondary-fixed": "#d2e4ff",
                        "surface-dim": "#11131d",
                        "tertiary-fixed-dim": "#bbc5ef",
                        "primary-container": "#00f0ff",
                        "on-surface-variant": "#b9cacb",
                        "on-background": "#e1e1f0",
                        "secondary-container": "#046dba",
                        "inverse-primary": "#006970",
                        "surface-variant": "#323440",
                        "primary": "#dbfcff",
                        "on-primary-container": "#006970",
                        "surface-container-highest": "#323440",
                        "surface-container-high": "#282934",
                        "on-tertiary-container": "#535d82",

                        "surface-container-lowest": "#0c0e18",

                        "on-surface": "#e1e1f0",
                        "tertiary-fixed": "#dbe1ff",
                        "tertiary": "#f6f5ff",
                        "on-primary": "#00363a",
                        "outline-variant": "#3b494b",
                        "on-secondary-container": "#e2edff",
                        "tertiary-container": "#cfd8ff",
                        "inverse-surface": "#e1e1f0",
                        "secondary-fixed-dim": "#a0c9ff",
                        "on-tertiary-fixed": "#0e1a3b",
                        "on-secondary-fixed": "#001c37",
                        "inverse-on-surface": "#2e303b",
                        "on-primary-fixed-variant": "#004f54"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin": "24px",
                        "gutter": "16px",
                        "container-max": "1440px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "code-snippet": ["JetBrains Mono"],
                        "headline-lg-mobile": ["IBM Plex Sans"],
                        "body-lg": ["Metrophobic"],
                        "label-caps": ["Space Grotesk"],
                        "body-sm": ["Metrophobic"],

                        "headline-lg": ["IBM Plex Sans"]
                    },
                    "fontSize": {
                        "code-snippet": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],

                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

                    }
                },
            },
        }

<style>
        .glacier-bg {
            background: radial-gradient(circle at 50% 50%, rgba(0, 219, 233, 0.05) 0%, rgba(17, 19, 29, 1) 100%);
        }
        .glass-panel {
            background: rgba(29, 31, 42, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 219, 233, 0.15);
            box-shadow: 0 0 30px rgba(0, 219, 233, 0.05), inset 0 0 20px rgba(0, 219, 233, 0.02);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 1px rgba(0, 240, 255, 0.5), inset 0 0 10px rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.8);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center font-body-lg glacier-bg overflow-hidden relative">
<div class="absolute inset-0 z-0 pointer-events-none opacity-20">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
<path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0, 219, 233, 0.2)" stroke-width="0.5"></path>
</pattern>
</defs>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
</svg>
</div>
<main class="w-full max-w-md px-margin z-10 relative">
<div class="glass-panel rounded-xl p-8 sm:p-10 flex flex-col items-center">
<div class="w-16 h-16 rounded-full bg-surface-container-high border border-primary/20 flex items-center justify-center mb-6 shadow-[0_0_15px_rgba(0,219,233,0.1)] relative">
<div class="absolute inset-0 rounded-full border border-primary/40 animate-ping opacity-20"></div>
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<h1 class="font-headline-lg-mobile sm:font-headline-lg text-primary tracking-tighter uppercase mb-2 text-center">VARMAN</h1>
<p class="font-code-snippet text-code-snippet text-on-surface-variant mb-8 text-center uppercase tracking-widest">Secure Access Protocol</p>
<form class="w-full space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-[14px]">terminal</span> Technical Identification
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-DEFAULT py-3 px-4 text-on-surface font-code-snippet text-code-snippet focus:outline-none input-glow transition-all placeholder:text-on-surface-variant/50" id="email" placeholder="admin@varman.sys" required="" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-[14px]">key</span> Cryptographic Access
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-DEFAULT py-3 px-4 text-on-surface font-code-snippet text-code-snippet focus:outline-none input-glow transition-all placeholder:text-on-surface-variant/50" id="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center w-4 h-4">
<input class="peer appearance-none w-4 h-4 bg-surface-container-highest border border-outline-variant rounded-[2px] checked:bg-primary-container checked:border-primary-container focus:outline-none input-glow cursor-pointer transition-colors" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary-container text-[12px] opacity-0 peer-checked:opacity-100 pointer-events-none" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-code-snippet text-code-snippet text-on-surface-variant group-hover:text-primary transition-colors">Retain Session</span>
</label>
<a class="font-code-snippet text-code-snippet text-primary hover:text-primary-fixed-dim hover:underline underline-offset-4 transition-colors" href="#">Forgot Credentials?</a>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-label-caps text-label-caps py-4 rounded-DEFAULT hover:bg-primary-fixed hover:shadow-[0_0_20px_rgba(0,240,255,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span class="material-symbols-outlined text-[16px]">login</span>
                    ESTABLISH LINK
                </button>
</form>
<div class="mt-8 flex items-center gap-2 font-code-snippet text-[10px] text-on-surface-variant/50 uppercase tracking-widest">
<span class="w-2 h-2 rounded-full bg-primary-container animate-pulse shadow-[0_0_5px_rgba(0,240,255,0.5)]"></span>
                Node Network Secure
            </div>
</div>
</main>
</body></html>
